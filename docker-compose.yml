services:
  postgres:
    image: postgres:16-alpine
    container_name: electronics-retail-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-electronics_retail_dw}
      POSTGRES_USER: ${POSTGRES_USER:-electronics_retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-electronics_retail_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-electronics_retail} -d ${POSTGRES_DB:-electronics_retail_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - electronics_retail_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8.13
    container_name: electronics-retail-pgadmin
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@electronics-retail.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electronics_retail_network
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    container_name: electronics-retail-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://electronics_retail:electronics_retail_password@postgres:5432/electronics_retail_dw
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    networks:
      - electronics_retail_network
    entrypoint: /bin/bash
    command: -c "airflow db init"

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    container_name: electronics-retail-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://electronics_retail:electronics_retail_password@postgres:5432/electronics_retail_dw
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    ports:
      - "8080:8080"
    networks:
      - electronics_retail_network
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    container_name: electronics-retail-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://electronics_retail:electronics_retail_password@postgres:5432/electronics_retail_dw
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    networks:
      - electronics_retail_network
    command: scheduler

volumes:
  postgres_data:
  pgadmin_data:

networks:
  electronics_retail_network:
    driver: bridge
